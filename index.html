<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Patrimonio Familiar Isukiza - V5 Optimizada</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;700;800&display=swap');
        body { font-family: 'Syne', sans-serif; background: #080e1a; color: #e2e8f0; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .card { background: rgba(15,23,42,0.7); border: 1px solid rgba(100,116,139,0.2); border-radius: 1.5rem; backdrop-filter: blur(10px); }
        .gain { color: #4ade80; } .loss { color: #f87171; }
        .inp { width: 100%; background: #0f172a; border: 1px solid #334155; border-radius: 8px; padding: 8px; font-family: 'JetBrains Mono'; font-size: 12px; color: white; outline: none; }
        .inp-sm { width: 90px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; padding: 4px 8px; font-family: 'JetBrains Mono'; font-size: 11px; text-align: right; }
        .lbl { font-family: 'JetBrains Mono'; font-size: 8px; font-weight: 700; text-transform: uppercase; color: #64748b; margin-bottom: 4px; display: block; }
        .spin { animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-6xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 pb-8 border-b border-slate-800 gap-6">
            <div>
                <h1 class="text-4xl font-extrabold tracking-tighter">ISUKIZA <span class="text-blue-500">•</span> LIVE</h1>
                <p id="status" class="mono text-[10px] text-amber-400 mt-2"><span class="spin">↻</span> Sincronizando mercados...</p>
            </div>
            
            <div class="flex items-center gap-8">
                <div class="w-28 h-28"><canvas id="mainChart"></canvas></div>
                <div class="card px-8 py-5 text-center min-w-[220px]">
                    <p class="mono text-[9px] text-slate-500 mb-1">TOTAL GLOBAL</p>
                    <p id="totalPatrimonio" class="mono text-4xl font-bold text-green-400">0,00 €</p>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div class="card p-6">
                <h2 class="text-xs font-bold text-blue-400 uppercase tracking-widest mb-4">📈 Bolsa (Live)</h2>
                <div id="listaAcciones" class="space-y-3">
                    <p class="mono text-[10px] text-slate-600 italic text-center py-10">Cargando precios de mercado...</p>
                </div>
            </div>

            <div class="card p-6">
                <h2 class="text-xs font-bold text-violet-400 uppercase tracking-widest mb-4">🌍 Fondos Indexados</h2>
                <div class="space-y-4">
                    <div class="bg-slate-900/50 p-4 rounded-xl border border-slate-800">
                        <div class="flex justify-between mb-3"><span class="text-sm font-bold">iShares Dev World</span><input type="number" id="f1_vl" step="any" oninput="calcFondo('f1')" class="inp-sm text-violet-300" placeholder="VL"></div>
                        <div class="grid grid-cols-2 gap-2">
                            <div><label class="lbl">Uds</label><input type="number" id="f1_part" step="any" oninput="calcFondo('f1')" class="inp"></div>
                            <div><label class="lbl">Coste</label><input type="number" id="f1_coste" step="any" oninput="calcFondo('f1')" class="inp"></div>
                        </div>
                        <div id="f1_res" class="mt-3 text-right mono text-xs font-bold text-violet-300">0,00 €</div>
                    </div>
                    <div class="bg-slate-900/50 p-4 rounded-xl border border-slate-800">
                        <div class="flex justify-between mb-3"><span class="text-sm font-bold">iShares Emerging</span><input type="number" id="f2_vl" step="any" oninput="calcFondo('f2')" class="inp-sm text-indigo-300" placeholder="VL"></div>
                        <div class="grid grid-cols-2 gap-2">
                            <div><label class="lbl">Uds</label><input type="number" id="f2_part" step="any" oninput="calcFondo('f2')" class="inp"></div>
                            <div><label class="lbl">Coste</label><input type="number" id="f2_coste" step="any" oninput="calcFondo('f2')" class="inp"></div>
                        </div>
                        <div id="f2_res" class="mt-3 text-right mono text-xs font-bold text-indigo-300">0,00 €</div>
                    </div>
                </div>
            </div>

            <div class="card p-6">
                <h2 class="text-xs font-bold text-emerald-400 uppercase tracking-widest mb-4">🌱 Cartera Indie</h2>
                <div class="grid grid-cols-2 gap-3 mb-3">
                    <div class="col-span-2"><label class="lbl">Valor Mercado (€)</label><input type="number" id="indie_mer" step="any" oninput="calcIndie()" class="inp text-emerald-300"></div>
                    <div><label class="lbl">Invertido</label><input type="number" id="indie_inv" step="any" oninput="calcIndie()" class="inp"></div>
                    <div><label class="lbl">Efectivo</label><input type="number" id="indie_ef" step="any" oninput="calcIndie()" class="inp"></div>
                </div>
                <div id="indie_total" class="text-right mono font-bold text-emerald-400">0,00 €</div>
            </div>

            <div class="card p-6 border-l-4 border-l-rose-600">
                <h2 class="text-xs font-bold text-rose-400 uppercase tracking-widest mb-4">🛡️ Jubilación EPSV</h2>
                <div class="space-y-4">
                    <div class="grid grid-cols-2 gap-2 bg-slate-900/50 p-3 rounded-xl">
                        <div><label class="lbl">Uds Tu Plan</label><input type="number" id="p1" step="any" oninput="calcEPSV()" class="inp"></div>
                        <div><label class="lbl">VLP (€)</label><input type="number" id="vlp" step="any" oninput="syncVLP(this.value)" class="inp text-rose-300"></div>
                    </div>
                    <div class="grid grid-cols-2 gap-2 bg-slate-900/50 p-3 rounded-xl">
                        <div><label class="lbl">Uds Su Plan</label><input type="number" id="p2" step="any" oninput="calcEPSV()" class="inp"></div>
                        <div><label class="lbl">VLP (€)</label><input type="number" id="vlp_m" step="any" oninput="syncVLP(this.value)" class="inp text-pink-300"></div>
                    </div>
                </div>
                <div id="totalEPSV" class="mt-4 text-right mono font-bold text-rose-400 text-lg">0,00 €</div>
            </div>
        </div>
    </div>

<script>
// --- CONFIGURACIÓN ---
const acciones = [
    { ticker: "AMZN", nombre: "Amazon", cant: 20, mon: "USD" },
    { ticker: "SAN.MC", nombre: "Santander", cant: 1080, mon: "EUR" },
    { ticker: "OHLA.MC", nombre: "OHLA", cant: 300, mon: "EUR" }
];
let precios = { "AMZN": 180, "SAN.MC": 4.5, "OHLA.MC": 0.45 }; // Valores iniciales por si falla la red
let usd_eur = 0.92;
let myChart;

function initChart() {
    const ctx = document.getElementById('mainChart').getContext('2d');
    myChart = new Chart(ctx, {
        type: 'doughnut',
        data: {
            labels: ['Bolsa', 'Fondos', 'Indie', 'EPSV'],
            datasets: [{
                data: [1, 1, 1, 1],
                backgroundColor: ['#3b82f6', '#8b5cf6', '#10b981', '#f43f5e'],
                borderWidth: 0
            }]
        },
        options: { cutout: '75%', plugins: { legend: { display: false } } }
    });
}

// --- LOGICA DE BOLSA ---
async function fetchPrice(ticker) {
    try {
        const url = `https://query1.finance.yahoo.com/v8/finance/chart/${ticker}`;
        const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
        const r = await fetch(proxy);
        const j = await r.json();
        const data = JSON.parse(j.contents);
        return data.chart.result[0].meta.regularMarketPrice || 0;
    } catch (e) { return 0; }
}

async function refreshBolsa() {
    const status = document.getElementById("status");
    const rate = await fetchPrice("USDEUR=X");
    if(rate > 0) usd_eur = rate;

    for (let a of acciones) {
        const p = await fetchPrice(a.ticker);
        if(p > 0) precios[a.ticker] = p;
    }
    
    status.className = "mono text-[10px] text-green-400 mt-2";
    status.innerText = "✓ Mercados sincronizados " + new Date().toLocaleTimeString();
    renderBolsa();
    calcTotal();
}

function renderBolsa() {
    const list = document.getElementById("listaAcciones");
    list.innerHTML = acciones.map(a => {
        const p = precios[a.ticker];
        const val = a.mon === "USD" ? (p * a.cant * usd_eur) : (p * a.cant);
        return `<div class="bg-slate-900/40 p-3 rounded-xl border border-slate-800 flex justify-between items-center">
            <div><p class="font-bold text-sm text-slate-200">${a.nombre}</p><p class="mono text-[9px] text-slate-500">${a.cant} uds · ${p.toFixed(2)} ${a.mon}</p></div>
            <p class="mono text-sm font-bold text-blue-300">${val.toLocaleString('es-ES',{minimumFractionDigits:2})} €</p>
        </div>`;
    }).join("");
}

// --- CÁLCULOS ---
function calcFondo(id) {
    const p = parseFloat(document.getElementById(id+"_part").value) || 0;
    const vl = parseFloat(document.getElementById(id+"_vl").value) || 0;
    document.getElementById(id+"_res").innerText = (p*vl).toLocaleString('es-ES') + " €";
    calcTotal(); save();
}

function calcIndie() {
    const m = parseFloat(document.getElementById("indie_mer").value) || 0;
    const e = parseFloat(document.getElementById("indie_ef").value) || 0;
    document.getElementById("indie_total").innerText = (m+e).toLocaleString('es-ES') + " €";
    calcTotal(); save();
}

function syncVLP(v) {
    document.getElementById("vlp").value = v;
    document.getElementById("vlp_m").value = v;
    calcEPSV();
}

function calcEPSV() {
    const vlp = parseFloat(document.getElementById("vlp").value) || 0;
    const total = ((parseFloat(document.getElementById("p1").value)||0) + (parseFloat(document.getElementById("p2").value)||0)) * vlp;
    document.getElementById("totalEPSV").innerText = total.toLocaleString('es-ES') + " €";
    calcTotal(); save();
}

function calcTotal() {
    let b = 0; acciones.forEach(a => b += (a.mon==="USD" ? precios[a.ticker]*a.cant*usd_eur : precios[a.ticker]*a.cant));
    let f = (parseFloat(document.getElementById("f1_part").value)||0)*(parseFloat(document.getElementById("f1_vl").value)||0) + (parseFloat(document.getElementById("f2_part").value)||0)*(parseFloat(document.getElementById("f2_vl").value)||0);
    let i = (parseFloat(document.getElementById("indie_mer").value)||0) + (parseFloat(document.getElementById("indie_ef").value)||0);
    let e = ((parseFloat(document.getElementById("p1").value)||0) + (parseFloat(document.getElementById("p2").value)||0)) * (parseFloat(document.getElementById("vlp").value)||0);
    
    const total = b+f+i+e;
    document.getElementById("totalPatrimonio").innerText = total.toLocaleString('es-ES', {minimumFractionDigits:2}) + " €";
    if(myChart) {
        myChart.data.datasets[0].data = [b, f, i, e];
        myChart.update();
    }
}

// --- PERSISTENCIA ---
function save() {
    const fields = ["f1_vl","f1_part","f1_coste","f2_vl","f2_part","f2_coste","indie_mer","indie_inv","indie_ef","p1","p2","vlp"];
    const d = {}; fields.forEach(f => d[f] = document.getElementById(f).value);
    localStorage.setItem("isukiza_v5_final", JSON.stringify(d));
}

window.onload = () => {
    initChart();
    const d = JSON.parse(localStorage.getItem("isukiza_v5_final")) || {};
    Object.keys(d).forEach(k => { if(document.getElementById(k)) document.getElementById(k).value = d[k]; });
    if(document.getElementById("vlp").value) document.getElementById("vlp_m").value = document.getElementById("vlp").value;
    
    // Lanzar cálculos manuales primero para que el gráfico no esté vacío
    calcFondo('f1'); calcFondo('f2'); calcIndie(); calcEPSV();
    renderBolsa();
    // Luego intentar refrescar la bolsa
    refreshBolsa();
    setInterval(refreshBolsa, 600000); // Cada 10 min
};
</script>
</body>
</html>
