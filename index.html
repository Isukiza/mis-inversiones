<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inversiones de Isukiza</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0f172a] text-slate-100 min-h-screen p-4 md:p-10">

    <div class="max-w-5xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-end mb-8 border-b border-slate-700 pb-6 gap-4">
            <div>
                <h1 class="text-3xl font-bold text-blue-400">Patrimonio Isukiza</h1>
                <p class="text-slate-400 text-sm italic">Actualizado con datos de mercado reales (Acciones)</p>
            </div>
            <div class="text-right">
                <p class="text-xs uppercase text-slate-500 font-bold">Patrimonio Neto Estimado</p>
                <p id="totalPatrimonio" class="text-4xl font-mono text-green-400 font-bold">0.00 €</p>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="bg-slate-800/50 p-5 rounded-2xl border border-slate-700 shadow-xl">
                <h2 class="text-lg font-bold mb-4 text-blue-300">📈 Bolsa</h2>
                <div id="listaAcciones" class="space-y-3"></div>
            </div>

            <div class="bg-slate-800/50 p-5 rounded-2xl border border-slate-700 shadow-xl">
                <h2 class="text-lg font-bold mb-4 text-purple-300">🏦 Fondos e Indie</h2>
                <div class="space-y-4">
                    <div>
                        <label class="text-[10px] text-slate-400 uppercase">Fondo IE000ZYRH0Q7 (€)</label>
                        <input type="number" id="f1" oninput="save()" class="w-full bg-slate-900 border border-slate-600 rounded p-2 text-sm">
                    </div>
                    <div>
                        <label class="text-[10px] text-slate-400 uppercase">Fondo IE000QAZP7L2 (€)</label>
                        <input type="number" id="f2" oninput="save()" class="w-full bg-slate-900 border border-slate-600 rounded p-2 text-sm">
                    </div>
                    <div>
                        <label class="text-[10px] text-slate-400 uppercase">MyInvestor Indie (€)</label>
                        <input type="number" id="indie" oninput="save()" class="w-full bg-slate-900 border border-slate-600 rounded p-2 text-sm">
                    </div>
                </div>
            </div>

            <div class="bg-slate-800/50 p-5 rounded-2xl border border-slate-700 shadow-xl">
                <h2 class="text-lg font-bold mb-4 text-orange-300">🛡️ Jubilación</h2>
                <div class="space-y-4">
                    <p class="text-xs text-slate-400">SAN ASG RV NORTEAM: <br><strong>1.376,6933</strong> participaciones</p>
                    <div>
                        <label class="text-[10px] text-slate-400 uppercase">Valor Liquidativo (VLP)</label>
                        <input type="number" id="vlp" oninput="save()" step="0.0001" placeholder="Ej: 12.4532" class="w-full bg-slate-900 border border-slate-600 rounded p-2 text-sm text-orange-200">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const accionesData = [
            { t: "AMZN", n: "Amazon", c: 20, m: "USD" },
            { t: "SAN.MC", n: "Santander", c: 1080, m: "EUR" },
            { t: "OHLA.MC", n: "OHLA", c: 300, m: "EUR" }
        ];

        let preciosActuales = { "AMZN": 185, "SAN.MC": 4.5, "OHLA.MC": 0.40 };

        async function fetchPrices() {
            // Usamos un proxy gratuito para obtener precios de Yahoo Finance sin API Key
            for (let a of accionesData) {
                try {
                    const res = await fetch(`https://query1.finance.yahoo.com/v8/finance/chart/${a.t}`);
                    const data = await res.json();
                    preciosActuales[a.t] = data.chart.result[0].meta.regularMarketPrice;
                } catch (e) { console.log("Error API", a.t); }
            }
            renderAcciones();
            calc();
        }

        function renderAcciones() {
            document.getElementById('listaAcciones').innerHTML = accionesData.map(a => `
                <div class="flex justify-between border-b border-slate-700 pb-2">
                    <span class="text-sm font-medium">${a.n}</span>
                    <span class="font-mono text-sm">${(preciosActuales[a.t] * a.c).toFixed(2)} ${a.m}</span>
                </div>
            `).join('');
        }

        function save() {
            const data = {
                f1: document.getElementById('f1').value,
                f2: document.getElementById('f2').value,
                indie: document.getElementById('indie').value,
                vlp: document.getElementById('vlp').value
            };
            localStorage.setItem('inv_data', JSON.stringify(data));
            calc();
        }

        function load() {
            const data = JSON.parse(localStorage.getItem('inv_data'));
            if (data) {
                document.getElementById('f1').value = data.f1;
                document.getElementById('f2').value = data.f2;
                document.getElementById('indie').value = data.indie;
                document.getElementById('vlp').value = data.vlp;
            }
            fetchPrices();
        }

        function calc() {
            let total = 0;
            // Acciones (Conversión USD a EUR aprox 0.92)
            accionesData.forEach(a => {
                let sub = preciosActuales[a.t] * a.c;
                total += (a.m === "USD") ? sub * 0.92 : sub;
            });
            // Fondos
            total += parseFloat(document.getElementById('f1').value || 0);
            total += parseFloat(document.getElementById('f2').value || 0);
            total += parseFloat(document.getElementById('indie').value || 0);
            // Pensión
            total += (parseFloat(document.getElementById('vlp').value || 0) * 1376.6933);

            document.getElementById('totalPatrimonio').innerText = total.toLocaleString('es-ES', { style: 'currency', currency: 'EUR' });
        }

        window.onload = load;
    </script>
</body>
</html>
