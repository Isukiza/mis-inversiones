<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inversiones Isukiza</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0f172a] text-slate-100 min-h-screen p-4 md:p-10 font-sans">

    <div class="max-w-4xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 border-b border-slate-700 pb-6 gap-4 text-center md:text-left">
            <div>
                <h1 class="text-3xl font-bold text-blue-400">Patrimonio Isukiza</h1>
                <p id="status" class="text-xs text-slate-500 font-mono mt-1 italic">Cargando precios de mercado...</p>
            </div>
            <div class="bg-slate-800/80 p-4 rounded-2xl border border-slate-700 shadow-xl min-w-[200px]">
                <p class="text-[10px] uppercase tracking-widest text-slate-500 font-bold mb-1">Total Estimado</p>
                <p id="totalPatrimonio" class="text-3xl font-mono text-green-400 font-bold">0.00 €</p>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-slate-800/40 p-6 rounded-3xl border border-slate-700/50 backdrop-blur-sm">
                <h2 class="text-xl font-semibold mb-5 flex items-center gap-2">
                    <span class="text-blue-400">●</span> Acciones en Vivo
                </h2>
                <div id="listaAcciones" class="space-y-4">
                    </div>
            </div>

            <div class="bg-slate-800/40 p-6 rounded-3xl border border-slate-700/50 backdrop-blur-sm">
                <h2 class="text-xl font-semibold mb-5 flex items-center gap-2">
                    <span class="text-purple-400">●</span> Fondos y Pensiones
                </h2>
                <div class="space-y-4">
                    <div class="bg-slate-900/50 p-3 rounded-xl">
                        <label class="text-[10px] text-slate-500 font-bold uppercase block mb-2 text-center italic border-b border-slate-700 pb-1">Intro valor total actual (€)</label>
                        <div class="space-y-3 mt-3">
                            <input type="number" id="f1" oninput="save()" placeholder="Fondo IE...RH0Q7" class="w-full bg-slate-800 border-none rounded-lg p-3 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                            <input type="number" id="f2" oninput="save()" placeholder="Fondo IE...P7L2" class="w-full bg-slate-800 border-none rounded-lg p-3 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                            <input type="number" id="indie" oninput="save()" placeholder="MyInvestor Indie" class="w-full bg-slate-800 border-none rounded-lg p-3 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                    </div>
                    
                    <div class="bg-orange-900/10 p-3 rounded-xl border border-orange-500/20 mt-4">
                        <p class="text-[11px] text-orange-200/70 mb-2 uppercase font-bold text-center">Plan SAN ASG RV Norteam</p>
                        <input type="number" id="vlp" oninput="save()" step="0.0001" placeholder="VLP (Valor Participación)" class="w-full bg-slate-800 border-none rounded-lg p-3 text-sm focus:ring-2 focus:ring-orange-500 outline-none text-orange-200">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Datos de tus activos
        const acciones = [
            { ticker: "AMZN", nombre: "Amazon", cantidad: 20, moneda: "USD" },
            { ticker: "SAN.MC", nombre: "Santander", cantidad: 1080, moneda: "EUR" },
            { ticker: "OHLA.MC", nombre: "OHLA", cantidad: 300, moneda: "EUR" }
        ];

        let precios = { "AMZN": 0, "SAN.MC": 0, "OHLA.MC": 0 };
        const TIPO_CAMBIO_EURUSD = 0.92; // 1 USD = 0.92 EUR aprox.

        async function getLivePrices() {
            document.getElementById('status').innerText = "Sincronizando con mercados...";
            
            for (let accion of acciones) {
                try {
                    // Usamos un proxy para saltar el bloqueo de Yahoo Finance
                    const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(`https://query1.finance.yahoo.com/v8/finance/chart/${accion.ticker}`)}`);
                    const json = await response.json();
                    const data = JSON.parse(json.contents);
                    precios[accion.ticker] = data.chart.result[0].meta.regularMarketPrice;
                } catch (e) {
                    console.error("Error cargando " + accion.ticker, e);
                    // Precios de respaldo si la API falla temporalmente
                    if(accion.ticker === "AMZN") precios[accion.ticker] = 175;
                    if(accion.ticker === "SAN.MC") precios[accion.ticker] = 3.90;
                }
            }
            document.getElementById('status').innerText = "Conectado a la Bolsa ✓";
            render();
        }

        function render() {
            const list = document.getElementById('listaAcciones');
            list.innerHTML = acciones.map(a => {
                const precioUnidad = precios[a.ticker] || 0;
                const valorTotal = (precioUnidad * a.cantidad).toLocaleString('es-ES', { minimumFractionDigits: 2 });
                return `
                    <div class="flex justify-between items-center p-3 bg-slate-900/40 rounded-xl hover:bg-slate-700/40 transition">
                        <div>
                            <p class="font-bold text-slate-100 text-sm">${a.nombre}</p>
                            <p class="text-[10px] text-slate-500 font-mono italic">${a.ticker}</p>
                        </div>
                        <div class="text-right">
                            <p class="font-mono text-blue-300 font-bold">${valorTotal} ${a.moneda}</p>
                            <p class="text-[10px] text-slate-500">${precioUnidad.toFixed(2)} / ud</p>
                        </div>
                    </div>
                `;
            }).join('');
            calc();
        }

        function save() {
            const fields = ['f1', 'f2', 'indie', 'vlp'];
            const data = {};
            fields.forEach(f => data[f] = document.getElementById(f).value);
            localStorage.setItem('isukiza_data', JSON.stringify(data));
            calc();
        }

        function load() {
            const data = JSON.parse(localStorage.getItem('isukiza_data'));
            if (data) {
                ['f1', 'f2', 'indie', 'vlp'].forEach(f => document.getElementById(f).value = data[f] || "");
            }
            getLivePrices();
        }

        function calc() {
            let totalEur = 0;
            
            // Acciones a EUR
            acciones.forEach(a => {
                let sub = (precios[a.ticker] || 0) * a.cantidad;
                totalEur += (a.moneda === "USD") ? sub * TIPO_CAMBIO_EURUSD : sub;
            });

            // Fondos
            totalEur += parseFloat(document.getElementById('f1').value || 0);
            totalEur += parseFloat(document.getElementById('f2').value || 0);
            totalEur += parseFloat(document.getElementById('indie').value || 0);

            // Pensión (1376.6933 participaciones)
            const vlp = parseFloat(document.getElementById('vlp').value || 0);
            totalEur += (vlp * 1376.6933);

            document.getElementById('totalPatrimonio').innerText = totalEur.toLocaleString('es-ES', { style: 'currency', currency: 'EUR' });
        }

        window.onload = load;
    </script>
</body>
</html>
