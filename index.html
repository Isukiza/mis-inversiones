<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inversiones Isukiza vFinal</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0f172a] text-slate-100 min-h-screen p-4 md:p-10 font-sans">

    <div class="max-w-4xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 border-b border-slate-700 pb-6 gap-4">
            <div>
                <h1 class="text-3xl font-bold text-blue-400">Patrimonio Isukiza</h1>
                <p id="status" class="text-xs text-slate-500 font-mono mt-1 italic">Sincronizando mercados...</p>
            </div>
            <div class="bg-slate-800/80 p-4 rounded-2xl border border-slate-700 shadow-xl min-w-[220px]">
                <p class="text-[10px] uppercase tracking-widest text-slate-500 font-bold mb-1 italic">Total Estimado</p>
                <p id="totalPatrimonio" class="text-3xl font-mono text-green-400 font-bold">0.00 €</p>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-slate-800/40 p-6 rounded-3xl border border-slate-700/50 backdrop-blur-sm shadow-lg">
                <h2 class="text-xl font-semibold mb-5 flex items-center gap-2 text-blue-300 italic">📈 Bolsa (Acciones)</h2>
                <div id="listaAcciones" class="space-y-4"></div>
            </div>

            <div class="bg-slate-800/40 p-6 rounded-3xl border border-slate-700/50 backdrop-blur-sm shadow-lg">
                <h2 class="text-xl font-semibold mb-5 flex items-center gap-2 text-purple-300 italic">🏦 Fondos y Gestión</h2>
                <div class="space-y-3">
                    <input type="number" id="f1" oninput="save()" placeholder="Fondo IE000ZYRH0Q7 (€)" class="w-full bg-slate-900/60 border border-slate-700 rounded-xl p-3 text-sm focus:ring-1 focus:ring-blue-500 outline-none">
                    <input type="number" id="f2" oninput="save()" placeholder="Fondo IE000QAZP7L2 (€)" class="w-full bg-slate-900/60 border border-slate-700 rounded-xl p-3 text-sm focus:ring-1 focus:ring-blue-500 outline-none">
                    <input type="number" id="indie" oninput="save()" placeholder="Cartera Indie MyInvestor (€)" class="w-full bg-slate-900/60 border border-slate-700 rounded-xl p-3 text-sm focus:ring-1 focus:ring-blue-500 outline-none">
                </div>
            </div>

            <div class="bg-slate-800/40 p-6 rounded-3xl border border-slate-700/50 backdrop-blur-sm md:col-span-2 shadow-xl border-l-4 border-l-orange-500">
                <div class="flex justify-between items-start mb-6">
                    <h2 class="text-xl font-semibold text-orange-400 flex items-center gap-2 italic">🛡️ Plan: SAN ASG RV NORTEAM</h2>
                    <a href="https://www.quefondos.com/es/planes/ficha/index.html?is=$N3681" target="_blank" class="text-[10px] bg-orange-500/20 hover:bg-orange-500/40 text-orange-300 px-3 py-1 rounded-full border border-orange-500/30 transition">
                        🔍 Consultar VLP Real
                    </a>
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 items-end bg-slate-900/40 p-6 rounded-2xl border border-slate-700/50">
                    <div>
                        <label class="text-[10px] text-orange-300/60 uppercase font-bold mb-2 block tracking-wider font-mono">Participaciones</label>
                        <input type="number" id="p_parts" oninput="save()" step="0.000001" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-3 text-sm font-mono text-white outline-none focus:ring-1 focus:ring-orange-500" placeholder="1376.6933">
                    </div>
                    <div>
                        <label class="text-[10px] text-orange-300/60 uppercase font-bold mb-2 block tracking-wider font-mono">VLP Actual</label>
                        <input type="number" id="vlp" oninput="save()" step="0.0001" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-3 text-sm font-mono text-orange-200 outline-none focus:ring-1 focus:ring-orange-500" placeholder="Ej: 20.2481">
                    </div>
                    <div class="bg-orange-500/10 p-3 rounded-lg border border-orange-500/20 text-right min-h-[68px] flex flex-col justify-center">
                        <label class="text-[10px] text-orange-300/60 uppercase font-bold mb-1 block">Valor Inversión</label>
                        <p id="totalPension" class="text-2xl font-mono font-bold text-orange-400 leading-none">0,00 €</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const acciones = [
            { ticker: "AMZN", nombre: "Amazon", cantidad: 20, moneda: "USD" },
            { ticker: "SAN.MC", nombre: "Santander", cantidad: 1080, moneda: "EUR" },
            { ticker: "OHLA.MC", nombre: "OHLA", cantidad: 300, moneda: "EUR" }
        ];

        let precios = { "AMZN": 0, "SAN.MC": 0, "OHLA.MC": 0 };
        const TIPO_CAMBIO_EURUSD = 0.92;

        async function getLivePrices() {
            document.getElementById('status').innerText = "Sincronizando bolsa...";
            for (let accion of acciones) {
                try {
                    const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(`https://query1.finance.yahoo.com/v8/finance/chart/${accion.ticker}`)}`);
                    const json = await response.json();
                    const data = JSON.parse(json.contents);
                    precios[accion.ticker] = data.chart.result[0].meta.regularMarketPrice;
                } catch (e) { console.error("Error " + accion.ticker); }
            }
            document.getElementById('status').innerText = "Precios mercado OK ✓";
            render();
        }

        function render() {
            const list = document.getElementById('listaAcciones');
            list.innerHTML = acciones.map(a => {
                const cotiz = precios[a.ticker] || 0;
                const total = (cotiz * a.cantidad).toLocaleString('es-ES', { minimumFractionDigits: 2 });
                return `
                    <div class="bg-slate-900/40 p-4 rounded-2xl border border-slate-700/30 hover:bg-slate-900/60 transition">
                        <div class="flex justify-between items-center mb-1">
                            <p class="font-bold text-slate-200">${a.nombre}</p>
                            <p class="font-mono text-blue-300 font-bold">${total} <span class="text-[9px]">${a.moneda}</span></p>
                        </div>
                        <div class="flex justify-between text-[10px] text-slate-500 font-mono">
                            <span>${a.cantidad} títulos</span>
                            <span>${cotiz.toFixed(2)} ${a.moneda}/ud</span>
                        </div>
                    </div>
                `;
            }).join('');
            calc();
        }

        function save() {
            const data = {
                f1: document.getElementById('f1').value,
                f2: document.getElementById('f2').value,
                indie: document.getElementById('indie').value,
                parts: document.getElementById('p_parts').value,
                vlp: document.getElementById('vlp').value
            };
            localStorage.setItem('isukiza_vFinal', JSON.stringify(data));
            calc();
        }

        function load() {
            const data = JSON.parse(localStorage.getItem('isukiza_vFinal'));
            if (data) {
                document.getElementById('f1').value = data.f1 || "";
                document.getElementById('f2').value = data.f2 || "";
                document.getElementById('indie').value = data.indie || "";
                document.getElementById('p_parts').value = data.parts || "1376.6933";
                document.getElementById('vlp').value = data.vlp || "";
            } else {
                document.getElementById('p_parts').value = "1376.6933";
            }
            getLivePrices();
        }

        function calc() {
            let totalEur = 0;
            acciones.forEach(a => {
                let sub = (precios[a.ticker] || 0) * a.cantidad;
                totalEur += (a.moneda === "USD") ? sub * TIPO_CAMBIO_EURUSD : sub;
            });
            totalEur += parseFloat(document.getElementById('f1').value || 0);
            totalEur += parseFloat(document.getElementById('f2').value || 0);
            totalEur += parseFloat(document.getElementById('indie').value || 0);
            
            const p = parseFloat(document.getElementById('p_parts').value || 0);
            const v = parseFloat(document.getElementById('vlp').value || 0);
            const totalP = p * v;
            totalEur += totalP;

            document.getElementById('totalPension').innerText = totalP.toLocaleString('es-ES', { minimumFractionDigits: 2 }) + " €";
            document.getElementById('totalPatrimonio').innerText = totalEur.toLocaleString('es-ES', { style: 'currency', currency: 'EUR' });
        }

        window.onload = load;
    </script>
</body>
</html>
