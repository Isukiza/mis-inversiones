<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Patrimonio Familiar Isukiza - LIVE</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0f172a] text-slate-100 min-h-screen p-4 md:p-10 font-sans">
    <div class="max-w-4xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 border-b border-slate-700 pb-6 gap-4">
            <div>
                <h1 class="text-3xl font-bold text-blue-400 font-mono tracking-tighter">PATRIMONIO ISUKIZA</h1>
                <p id="status" class="text-xs text-orange-400 font-mono mt-1 animate-pulse">Iniciando conexión con mercados...</p>
            </div>
            <div class="bg-slate-800/80 p-4 rounded-2xl border border-slate-700 shadow-xl min-w-[220px]">
                <p class="text-[10px] uppercase tracking-widest text-slate-500 font-bold mb-1 text-center font-mono">Total Global (EUR)</p>
                <p id="totalPatrimonio" class="text-3xl font-mono text-green-400 font-bold text-center">0.00 €</p>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-slate-800/40 p-6 rounded-3xl border border-slate-700/50 backdrop-blur-sm shadow-lg">
                <h2 class="text-xl font-semibold mb-5 flex items-center gap-2 text-blue-300 italic font-mono font-bold underline decoration-blue-500/30">📈 Mercado en Vivo</h2>
                <div id="listaAcciones" class="space-y-4">
                    </div>
            </div>

            <div class="bg-slate-800/40 p-6 rounded-3xl border border-slate-700/50 backdrop-blur-sm shadow-lg">
                <h2 class="text-xl font-semibold mb-5 flex items-center gap-2 text-purple-300 italic font-mono font-bold underline decoration-purple-500/30">🏦 Otros Activos</h2>
                <div class="space-y-4">
                    <div>
                        <label class="text-[9px] text-slate-400 uppercase font-bold ml-1">Fondo IE...H0Q7 (€)</label>
                        <input type="number" id="f1" oninput="save()" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-sm focus:ring-1 focus:ring-purple-500 outline-none">
                    </div>
                    <div>
                        <label class="text-[9px] text-slate-400 uppercase font-bold ml-1">Fondo IE...P7L2 (€)</label>
                        <input type="number" id="f2" oninput="save()" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-sm focus:ring-1 focus:ring-purple-500 outline-none">
                    </div>
                    <div>
                        <label class="text-[9px] text-slate-400 uppercase font-bold ml-1 text-purple-300">Indie MyInvestor (€)</label>
                        <input type="number" id="indie" oninput="save()" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-sm focus:ring-1 focus:ring-purple-500 outline-none font-bold text-purple-200">
                    </div>
                </div>
            </div>

            <div class="bg-slate-800/40 p-6 rounded-3xl border border-slate-700/50 backdrop-blur-sm md:col-span-2 border-l-4 border-l-red-500 shadow-2xl">
                <div class="flex flex-col sm:flex-row justify-between items-start mb-6 gap-4 border-b border-red-900/40 pb-4">
                    <div>
                        <h2 class="text-xl font-semibold text-red-400 italic font-mono font-bold">🛡️ JUBILACIÓN (SANTANDER ASG)</h2>
                        <p class="text-[10px] text-slate-500 mt-1 uppercase font-bold">Actualiza el VLP para sincronizar ambos planes</p>
                    </div>
                    <a href="https://www.santanderassetmanagement.es/buscadorproductos/#/detalle?tipo=epsv&codigo=312924&nombre=Santander%20ASG%20RV%20Norteam%C3%A9rica,%20P.P.S.I." target="_blank" class="bg-red-600 hover:bg-red-500 text-white text-[10px] font-bold py-3 px-6 rounded-xl shadow-lg transition-all active:scale-95">
                        🔗 CONSULTAR VLP OFICIAL
                    </a>
                </div>
                
                <div class="space-y-4">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 items-center bg-slate-900/40 p-4 rounded-xl border border-slate-700/50">
                        <div><label class="text-[9px] text-red-400 font-bold mb-1 block italic">Tus Participaciones</label><input type="number" id="p1" oninput="save()" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2 text-sm font-mono"></div>
                        <div><label class="text-[9px] text-red-400 font-bold mb-1 block italic">VLP Actual</label><input type="number" id="vlp" oninput="syncVLP(this.value)" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2 text-sm font-mono text-red-200" placeholder="Ej: 22.14"></div>
                        <div class="text-right"><p id="res1" class="text-xl font-mono font-bold text-red-400">0,00 €</p><p class="text-[8px] text-slate-500 font-bold uppercase">Tu Inversión</p></div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 items-center bg-slate-900/40 p-4 rounded-xl border border-slate-700/50">
                        <div><label class="text-[9px] text-pink-400 font-bold mb-1 block italic">Participaciones Ella</label><input type="number" id="p2" oninput="save()" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2 text-sm font-mono"></div>
                        <div><label class="text-[9px] text-pink-400 font-bold mb-1 block italic">VLP Actual</label><input type="number" id="vlp_m" oninput="syncVLP(this.value)" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2 text-sm font-mono text-pink-200" placeholder="Ej: 22.14"></div>
                        <div class="text-right"><p id="res2" class="text-xl font-mono font-bold text-pink-400">0,00 €</p><p class="text-[8px] text-slate-500 font-bold uppercase">Inversión Ella</p></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const acciones = [
            { ticker: "AMZN", nombre: "Amazon", cant: 20, mon: "USD" },
            { ticker: "SAN.MC", nombre: "Santander", cant: 1080, mon: "EUR" },
            { ticker: "OHLA.MC", nombre: "OHLA", cant: 300, mon: "EUR" }
        ];

        let precios = { "AMZN": 180.1, "SAN.MC": 4.6, "OHLA.MC": 0.42 };
        let usd_eur = 0.92;

        async function fetchPrices() {
            document.getElementById('status').innerText = "🔄 Actualizando precios reales...";
            
            // 1. Obtener tipo de cambio USD/EUR real
            try {
                const fx = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent('https://query1.finance.yahoo.com/v8/finance/chart/EURUSD=X')}`);
                const fx_data = JSON.parse((await fx.json()).contents);
                usd_eur = fx_data.chart.result[0].meta.regularMarketPrice;
            } catch(e) { console.log("Usando FX por defecto"); }

            // 2. Obtener precios de cada acción
            for (let a of acciones) {
                try {
                    const resp = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(`https://query1.finance.yahoo.com/v8/finance/chart/${a.ticker}`)}`);
                    const data = JSON.parse((await resp.json()).contents);
                    if(data.chart.result[0].meta.regularMarketPrice) {
                        precios[a.ticker] = data.chart.result[0].meta.regularMarketPrice;
                    }
                } catch(e) { console.log("Fallo en " + a.ticker); }
            }
            
            document.getElementById('status').className = "text-xs text-green-400 font-mono mt-1";
            document.getElementById('status').innerText = "✓ Datos de mercado actualizados";
            render();
        }

        function syncVLP(v) {
            document.getElementById('vlp').value = v;
            document.getElementById('vlp_m').value = v;
            save();
        }

        function render() {
            const list = document.getElementById('listaAcciones');
            list.innerHTML = acciones.map(a => {
                const price = precios[a.ticker];
                const sub = price * a.cant;
                const link = `https://finance.yahoo.com/quote/${a.ticker}`;
                return `<div class="bg-slate-900/40 p-4 rounded-2xl border border-slate-700/30 flex justify-between items-center group hover:border-blue-500/50 transition-all">
                    <div>
                        <a href="${link}" target="_blank" class="font-bold text-slate-200 hover:text-blue-400 flex items-center gap-1">
                            ${a.nombre} <span class="text-[9px] text-blue-500">↗</span>
                        </a>
                        <p class="text-[10px] text-slate-500 font-mono">${a.cant} uds @ ${price.toFixed(2)} ${a.mon}</p>
                    </div>
                    <p class="font-mono text-blue-300 font-bold text-lg">${sub.toLocaleString('es-ES', { minimumFractionDigits: 2 })} <span class="text-[9px] text-slate-500 font-normal">${a.mon}</span></p>
                </div>`;
            }).join('');
            calc();
        }

        function save() {
            const d = {
                f1: document.getElementById('f1').value,
                f2: document.getElementById('f2').value,
                indie: document.getElementById('indie').value,
                p1: document.getElementById('p1').value,
                p2: document.getElementById('p2').value,
                vlp: document.getElementById('vlp').value
            };
            localStorage.setItem('isukiza_vFinal_Live', JSON.stringify(d));
            calc();
        }

        function load() {
            const d = JSON.parse(localStorage.getItem('isukiza_vFinal_Live')) || {p1: "1376.6933", p2: "1975.6095"};
            document.getElementById('f1').value = d.f1 || "";
            document.getElementById('f2').value = d.f2 || "";
            document.getElementById('indie').value = d.indie || "";
            document.getElementById('p1').value = d.p1 || "1376.6933";
            document.getElementById('p2').value = d.p2 || "1975.6095";
            document.getElementById('vlp').value = d.vlp || "";
            document.getElementById('vlp_m').value = d.vlp || "";
            fetchPrices();
        }

        function calc() {
            let total = 0;
            // Bolsa
            acciones.forEach(a => {
                let sub = precios[a.ticker] * a.cant;
                total += (a.mon === "USD") ? sub * usd_eur : sub;
            });
            // Fondos
            total += parseFloat(document.getElementById('f1').value || 0);
            total += parseFloat(document.getElementById('f2').value || 0);
            total += parseFloat(document.getElementById('indie').value || 0);
            // Jubilación
            const v = parseFloat(document.getElementById('vlp').value || 0);
            const r1 = parseFloat(document.getElementById('p1').value || 0) * v;
            const r2 = parseFloat(document.getElementById('p2').value || 0) * v;
            
            document.getElementById('res1').innerText = r1.toLocaleString('es-ES', {minimumFractionDigits: 2}) + " €";
            document.getElementById('res2').innerText = r2.toLocaleString('es-ES', {minimumFractionDigits: 2}) + " €";
            
            total += (r1 + r2);
            document.getElementById('totalPatrimonio').innerText = total.toLocaleString('es-ES', {style: 'currency', currency: 'EUR'});
        }

        window.onload = load;
    </script>
</body>
</html>
