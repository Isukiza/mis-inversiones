<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inversiones Isukiza</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0f172a] text-slate-100 min-h-screen p-4 md:p-10 font-sans">

    <div class="max-w-4xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 border-b border-slate-700 pb-6 gap-4 text-center md:text-left">
            <div>
                <h1 class="text-3xl font-bold text-blue-400">Patrimonio Isukiza</h1>
                <p id="status" class="text-xs text-slate-500 font-mono mt-1 italic">Conectando con mercados...</p>
            </div>
            <div class="bg-slate-800/80 p-4 rounded-2xl border border-slate-700 shadow-xl min-w-[220px]">
                <p class="text-[10px] uppercase tracking-widest text-slate-500 font-bold mb-1 italic">Patrimonio Neto Estimado</p>
                <p id="totalPatrimonio" class="text-3xl font-mono text-green-400 font-bold">0.00 €</p>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-slate-800/40 p-6 rounded-3xl border border-slate-700/50 backdrop-blur-sm">
                <h2 class="text-xl font-semibold mb-5 flex items-center gap-2 text-blue-300">
                    📈 Bolsa (Acciones)
                </h2>
                <div id="listaAcciones" class="space-y-4">
                    </div>
            </div>

            <div class="bg-slate-800/40 p-6 rounded-3xl border border-slate-700/50 backdrop-blur-sm">
                <h2 class="text-xl font-semibold mb-5 flex items-center gap-2 text-purple-300">
                    🏦 Fondos y Gestión
                </h2>
                <div class="space-y-4">
                    <div class="bg-slate-900/30 p-4 rounded-xl">
                        <label class="text-[10px] text-slate-500 font-bold uppercase block mb-3">Valor actual de tus posiciones (€)</label>
                        <div class="space-y-3">
                            <input type="number" id="f1" oninput="save()" placeholder="Fondo IE000ZYRH0Q7" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-3 text-sm focus:ring-1 focus:ring-blue-500 outline-none">
                            <input type="number" id="f2" oninput="save()" placeholder="Fondo IE000QAZP7L2" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-3 text-sm focus:ring-1 focus:ring-blue-500 outline-none">
                            <input type="number" id="indie" oninput="save()" placeholder="Cartera Indie MyInvestor" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-3 text-sm focus:ring-1 focus:ring-blue-500 outline-none">
                        </div>
                    </div>
                </div>
            </div>

            <div class="bg-slate-800/40 p-6 rounded-3xl border border-slate-700/50 backdrop-blur-sm md:col-span-2">
                <h2 class="text-xl font-semibold mb-4 flex items-center gap-2 text-orange-400">
                    🛡️ Plan de Pensiones
                </h2>
                <div class="flex flex-col md:flex-row gap-6 items-center bg-orange-900/10 p-5 rounded-2xl border border-orange-500/10">
                    <div class="flex-1">
                        <p class="text-sm font-bold">SAN ASG RV NORTEAM</p>
                        <p class="text-xs text-slate-400 font-mono">Participaciones: 1.376,6933</p>
                    </div>
                    <div class="w-full md:w-64">
                        <label class="text-[10px] text-slate-500 uppercase font-bold">Valor Liquidativo (VLP)</label>
                        <input type="number" id="vlp" oninput="save()" step="0.0001" placeholder="Ej: 12.4532" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-3 text-sm text-orange-200 focus:ring-1 focus:ring-orange-500 outline-none">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const acciones = [
            { ticker: "AMZN", nombre: "Amazon", cantidad: 20, moneda: "USD" },
            { ticker: "SAN.MC", nombre: "Santander", cantidad: 1080, moneda: "EUR" },
            { ticker: "OHLA.MC", nombre: "OHLA", cantidad: 300, moneda: "EUR" }
        ];

        let precios = { "AMZN": 0, "SAN.MC": 0, "OHLA.MC": 0 };
        const TIPO_CAMBIO_EURUSD = 0.92;

        async function getLivePrices() {
            document.getElementById('status').innerText = "Sincronizando bolsa...";
            for (let accion of acciones) {
                try {
                    const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(`https://query1.finance.yahoo.com/v8/finance/chart/${accion.ticker}`)}`);
                    const json = await response.json();
                    const data = JSON.parse(json.contents);
                    precios[accion.ticker] = data.chart.result[0].meta.regularMarketPrice;
                } catch (e) {
                    console.error("Error " + accion.ticker, e);
                    if(accion.ticker === "AMZN") precios[accion.ticker] = 185.00; // Respaldo
                    if(accion.ticker === "SAN.MC") precios[accion.ticker] = 4.50;
                    if(accion.ticker === "OHLA.MC") precios[accion.ticker] = 0.40;
                }
            }
            document.getElementById('status').innerText = "Precios de mercado OK ✓";
            render();
        }

        function render() {
            const list = document.getElementById('listaAcciones');
            list.innerHTML = acciones.map(a => {
                const cotizacion = precios[a.ticker] || 0;
                const totalActivo = (cotizacion * a.cantidad).toLocaleString('es-ES', { minimumFractionDigits: 2 });
                return `
                    <div class="bg-slate-900/40 p-4 rounded-xl border border-slate-700/30">
                        <div class="flex justify-between items-start mb-1">
                            <p class="font-bold text-slate-100">${a.nombre}</p>
                            <p class="font-mono text-blue-400 font-bold text-lg">${totalActivo} <span class="text-[10px]">${a.moneda}</span></p>
                        </div>
                        <div class="flex justify-between text-[11px] text-slate-500 font-mono">
                            <span>${a.cantidad} títulos</span>
                            <span>Cotización: ${cotizacion.toFixed(2)} ${a.moneda}</span>
                        </div>
                    </div>
                `;
            }).join('');
            calc();
        }

        function save() {
            const data = {
                f1: document.getElementById('f1').value,
                f2: document.getElementById('f2').value,
                indie: document.getElementById('indie').value,
                vlp: document.getElementById('vlp').value
            };
            localStorage.setItem('isukiza_v3', JSON.stringify(data));
            calc();
        }

        function load() {
            const data = JSON.parse(localStorage.getItem('isukiza_v3'));
            if (data) {
                document.getElementById('f1').value = data.f1 || "";
                document.getElementById('f2').value = data.f2 || "";
                document.getElementById('indie').value = data.indie || "";
                document.getElementById('vlp').value = data.vlp || "";
            }
            getLivePrices();
        }

        function calc() {
            let totalEur = 0;
            acciones.forEach(a => {
                let sub = (precios[a.ticker] || 0) * a.cantidad;
                totalEur += (a.moneda === "USD") ? sub * TIPO_CAMBIO_EURUSD : sub;
            });
            totalEur += parseFloat(document.getElementById('f1').value || 0);
            totalEur += parseFloat(document.getElementById('f2').value || 0);
            totalEur += parseFloat(document.getElementById('indie').value || 0);
            totalEur += (parseFloat(document.getElementById('vlp').value || 0) * 1376.6933);

            document.getElementById('totalPatrimonio').innerText = totalEur.toLocaleString('es-ES', { style: 'currency', currency: 'EUR' });
        }

        window.onload = load;
    </script>
</body>
</html>
