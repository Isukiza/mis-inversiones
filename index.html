<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patrimonio Isukiza - ULTRA LIGHT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { background: #0f172a; color: #f1f5f9; font-family: 'JetBrains Mono', monospace; }
        .card { background: #1e293b; border: 1px solid #334155; border-radius: 1rem; padding: 1.5rem; }
        .inp { width: 100%; background: #0f172a; border: 1px solid #475569; border-radius: 0.5rem; padding: 0.5rem; color: white; outline: none; font-size: 0.8rem; }
        .inp:focus { border-color: #3b82f6; }
        .lbl { font-size: 0.65rem; color: #94a3b8; font-weight: bold; text-transform: uppercase; margin-bottom: 0.3rem; display: block; }
        .gain { color: #4ade80; } .loss { color: #f87171; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-5xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-6 border-b border-slate-700 pb-6">
            <div>
                <h1 class="text-3xl font-bold tracking-tighter text-white">ISUKIZA <span class="text-blue-500">LIVE</span></h1>
                <p id="status" class="text-[10px] text-amber-500 mt-1">● Cargando sistema...</p>
            </div>
            <div class="text-center bg-slate-800 p-4 rounded-2xl min-w-[200px]">
                <p class="text-[9px] text-slate-400">TOTAL PATRIMONIO</p>
                <p id="totalGlobal" class="text-3xl font-bold text-green-400">0,00 €</p>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            
            <div class="card">
                <h2 class="text-blue-400 text-xs font-bold mb-4">📈 BOLSA EN VIVO</h2>
                <div id="listaBolsa" class="space-y-3 text-sm">
                    </div>
            </div>

            <div class="card">
                <h2 class="text-violet-400 text-xs font-bold mb-4">🌍 FONDOS INDEXADOS</h2>
                <div class="space-y-4">
                    <div class="p-3 bg-slate-900/50 rounded-lg">
                        <p class="text-xs font-bold mb-2">iShares Dev World</p>
                        <div class="grid grid-cols-2 gap-2">
                            <div><label class="lbl">Uds</label><input type="number" id="f1_p" step="any" oninput="calc()" class="inp"></div>
                            <div><label class="lbl">VL (€)</label><input type="number" id="f1_v" step="any" oninput="calc()" class="inp text-violet-300"></div>
                        </div>
                    </div>
                    <div class="p-3 bg-slate-900/50 rounded-lg">
                        <p class="text-xs font-bold mb-2">iShares Emerging</p>
                        <div class="grid grid-cols-2 gap-2">
                            <div><label class="lbl">Uds</label><input type="number" id="f2_p" step="any" oninput="calc()" class="inp"></div>
                            <div><label class="lbl">VL (€)</label><input type="number" id="f2_v" step="any" oninput="calc()" class="inp text-indigo-300"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card">
                <h2 class="text-emerald-400 text-xs font-bold mb-4">🌱 CARTERA INDIE</h2>
                <div class="grid grid-cols-2 gap-3">
                    <div class="col-span-2"><label class="lbl">Mercado (€)</label><input type="number" id="i_m" step="any" oninput="calc()" class="inp text-emerald-300"></div>
                    <div><label class="lbl">Efectivo</label><input type="number" id="i_e" step="any" oninput="calc()" class="inp"></div>
                    <div class="text-right pt-4"><p id="res_indie" class="font-bold text-emerald-400">0,00 €</p></div>
                </div>
            </div>

            <div class="card border-l-4 border-rose-500">
                <h2 class="text-rose-400 text-xs font-bold mb-4">🛡️ JUBILACIÓN EPSV</h2>
                <div class="space-y-3">
                    <div class="flex gap-2">
                        <div class="w-1/2"><label class="lbl">Uds Tu Plan</label><input type="number" id="e_p1" step="any" oninput="calc()" class="inp"></div>
                        <div class="w-1/2"><label class="lbl">VLP (€)</label><input type="number" id="e_v" step="any" oninput="calcSyncVLP(this.value)" class="inp text-rose-300"></div>
                    </div>
                    <div class="flex gap-2">
                        <div class="w-1/2"><label class="lbl">Uds Su Plan</label><input type="number" id="e_p2" step="any" oninput="calc()" class="inp"></div>
                        <div class="w-1/2"><label class="lbl">VLP (€)</label><input type="number" id="e_v2" step="any" oninput="calcSyncVLP(this.value)" class="inp text-pink-300"></div>
                    </div>
                    <div class="text-right pt-2 border-t border-slate-700 mt-2">
                        <p id="res_epsv" class="text-xl font-bold text-rose-400">0,00 €</p>
                    </div>
                </div>
            </div>

        </div>
    </div>

<script>
// DATOS BOLSA
const stocks = [
    { t: "AMZN", n: "Amazon", c: 20, m: "USD" },
    { t: "SAN.MC", n: "Santander", c: 1080, m: "EUR" },
    { t: "OHLA.MC", n: "OHLA", c: 300, m: "EUR" }
];
let prices = { "AMZN": 180, "SAN.MC": 4.5, "OHLA.MC": 0.44 };
let eur_usd = 1.08;

// FUNCION PRINCIPAL DE CALCULO
function calc() {
    // 1. Bolsa
    let totalBolsa = 0;
    stocks.forEach(s => {
        let p = prices[s.t] || 0;
        let val = s.m === "USD" ? (p * s.c / eur_usd) : (p * s.c);
        totalBolsa += val;
    });
    renderBolsa();

    // 2. Fondos
    let f1 = (parseFloat(document.getElementById("f1_p").value)||0) * (parseFloat(document.getElementById("f1_v").value)||0);
    let f2 = (parseFloat(document.getElementById("f2_p").value)||0) * (parseFloat(document.getElementById("f2_v").value)||0);
    
    // 3. Indie
    let indie = (parseFloat(document.getElementById("i_m").value)||0) + (parseFloat(document.getElementById("i_e").value)||0);
    document.getElementById("res_indie").innerText = indie.toLocaleString('es-ES') + " €";

    // 4. EPSV
    let vlp = parseFloat(document.getElementById("e_v").value)||0;
    let epsv = ((parseFloat(document.getElementById("e_p1").value)||0) + (parseFloat(document.getElementById("e_p2").value)||0)) * vlp;
    document.getElementById("res_epsv").innerText = epsv.toLocaleString('es-ES') + " €";

    // TOTAL
    let total = totalBolsa + f1 + f2 + indie + epsv;
    document.getElementById("totalGlobal").innerText = total.toLocaleString('es-ES', {minimumFractionDigits:2}) + " €";
    
    save();
}

function calcSyncVLP(v) {
    document.getElementById("e_v").value = v;
    document.getElementById("e_v2").value = v;
    calc();
}

function renderBolsa() {
    const list = document.getElementById("listaBolsa");
    list.innerHTML = stocks.map(s => {
        let p = prices[s.t] || 0;
        let val = s.m === "USD" ? (p * s.c / eur_usd) : (p * s.c);
        return `<div class="flex justify-between items-center bg-slate-900/30 p-2 rounded">
            <span>${s.n} <small class="text-slate-500">${s.c} uds</small></span>
            <span class="font-bold text-blue-300">${val.toLocaleString('es-ES')} €</span>
        </div>`;
    }).join("");
}

// FETCH REAL (ALLORIGINS)
async function updateMarket() {
    document.getElementById("status").innerText = "↻ Sincronizando...";
    try {
        // Tipo de cambio
        const rx = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent('https://query1.finance.yahoo.com/v8/finance/chart/EURUSD=X')}`);
        const jx = await rx.json();
        eur_usd = JSON.parse(jx.contents).chart.result[0].meta.regularMarketPrice || 1.08;

        for (let s of stocks) {
            const rs = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent('https://query1.finance.yahoo.com/v8/finance/chart/'+s.t)}`);
            const js = await rs.json();
            const p = JSON.parse(js.contents).chart.result[0].meta.regularMarketPrice;
            if(p) prices[s.t] = p;
        }
        document.getElementById("status").innerText = "● LIVE " + new Date().toLocaleTimeString();
    } catch(e) {
        document.getElementById("status").innerText = "● Usando datos locales (Offline)";
    }
    calc();
}

// PERSISTENCIA
function save() {
    const ids = ["f1_p","f1_v","f2_p","f2_v","i_m","i_e","e_p1","e_p2","e_v"];
    let data = {};
    ids.forEach(id => data[id] = document.getElementById(id).value);
    localStorage.setItem("isukiza_vFinal", JSON.stringify(data));
}

function load() {
    let data = JSON.parse(localStorage.getItem("isukiza_vFinal")) || {};
    Object.keys(data).forEach(id => { if(document.getElementById(id)) document.getElementById(id).value = data[id]; });
    document.getElementById("e_v2").value = document.getElementById("e_v").value;
    updateMarket();
}

window.onload = load;
</script>
</body>
</html>
